<header class="header" role="banner">
  <div class="header__container">
    <!-- Logo -->
    <a routerLink="/" class="header__logo" aria-label="Reino & Flor - Página inicial">
      <span class="header__logo-text">Reino & Flor</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="header__nav" aria-label="Navegação principal">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="header__nav-link">Início</a>
      <a routerLink="/catalog" routerLinkActive="active" class="header__nav-link">Coleção</a>
      <a routerLink="/sobre" routerLinkActive="active" class="header__nav-link">Sobre</a>
      <a routerLink="/contato" routerLinkActive="active" class="header__nav-link">Contato</a>
    </nav>

    <!-- Actions -->
    <div class="header__actions">
      <button class="header__action-btn" aria-label="Buscar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <a routerLink="/auth/login" class="header__action-btn" aria-label="Minha conta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </a>
      <button class="header__action-btn header__cart-btn" aria-label="Carrinho">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span class="header__cart-badge">0</span>
      </button>

      <!-- Mobile hamburger -->
      <button class="header__hamburger" (click)="toggleMenu()" [attr.aria-expanded]="mobileMenuOpen()" aria-label="Menu">
        <span class="header__hamburger-line" [class.open]="mobileMenuOpen()"></span>
        <span class="header__hamburger-line" [class.open]="mobileMenuOpen()"></span>
        <span class="header__hamburger-line" [class.open]="mobileMenuOpen()"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileMenuOpen()) {
    <nav class="header__mobile-menu" aria-label="Menu mobile">
      <a routerLink="/" (click)="closeMenu()" class="header__mobile-link">Início</a>
      <a routerLink="/catalog" (click)="closeMenu()" class="header__mobile-link">Coleção</a>
      <a routerLink="/sobre" (click)="closeMenu()" class="header__mobile-link">Sobre</a>
      <a routerLink="/contato" (click)="closeMenu()" class="header__mobile-link">Contato</a>
      <a routerLink="/auth/login" (click)="closeMenu()" class="header__mobile-link header__mobile-link--cta">Entrar</a>
    </nav>
  }
</header>
