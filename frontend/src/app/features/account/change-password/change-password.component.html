<div class="password-page">
  <div class="page-header">
    <h2>Alterar Senha</h2>
    <p>Para sua segurança, use uma senha forte com pelo menos 8 caracteres.</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="password-form" novalidate>
    <div class="form-field">
      <label for="currentPassword">Senha atual</label>
      <input
        id="currentPassword"
        type="password"
        formControlName="currentPassword"
        autocomplete="current-password"
        placeholder="Digite sua senha atual"
      />
      <span
        class="field-error"
        *ngIf="form.get('currentPassword')?.invalid && form.get('currentPassword')?.touched"
      >
        Senha atual é obrigatória
      </span>
    </div>

    <div class="form-field">
      <label for="newPassword">Nova senha</label>
      <input
        id="newPassword"
        type="password"
        formControlName="newPassword"
        autocomplete="new-password"
        placeholder="Mínimo 8 caracteres"
      />
      <span
        class="field-error"
        *ngIf="form.get('newPassword')?.hasError('required') && form.get('newPassword')?.touched"
      >
        Nova senha é obrigatória
      </span>
      <span
        class="field-error"
        *ngIf="form.get('newPassword')?.hasError('minlength') && form.get('newPassword')?.touched"
      >
        A senha deve ter no mínimo 8 caracteres
      </span>
      <span class="field-hint">Mínimo de 8 caracteres</span>
    </div>

    <div class="form-field">
      <label for="confirmPassword">Confirmar nova senha</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        autocomplete="new-password"
        placeholder="Repita a nova senha"
      />
      <span
        class="field-error"
        *ngIf="form.get('confirmPassword')?.touched && form.hasError('passwordMismatch')"
      >
        As senhas não coincidem
      </span>
    </div>

    <div class="form-actions">
      <button
        type="submit"
        class="btn-primary"
        [disabled]="form.invalid || loading()"
      >
        <span *ngIf="!loading()">Alterar Senha</span>
        <span *ngIf="loading()">Processando...</span>
      </button>
    </div>
  </form>

  <div class="success-message" *ngIf="successMsg()" role="alert">
    {{ successMsg() }}
  </div>

  <div class="error-message" *ngIf="errorMsg()" role="alert">
    {{ errorMsg() }}
  </div>
</div>
