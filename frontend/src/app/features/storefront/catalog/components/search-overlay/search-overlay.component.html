@if (open()) {
  <div class="search-overlay" (click)="onBackdropClick()">
    <div
      class="search-overlay__container"
      role="combobox"
      aria-haspopup="listbox"
      [attr.aria-expanded]="suggestions().length > 0"
      aria-owns="search-suggestions-list"
      (click)="$event.stopPropagation()"
    >
      <div class="search-overlay__input-wrapper">
        <svg class="search-overlay__icon" aria-hidden="true" viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input
          #searchInput
          type="search"
          class="search-overlay__input"
          [value]="searchValue()"
          (input)="onInput($event)"
          (keydown)="onKeydown($event)"
          placeholder="Buscar produtos..."
          aria-label="Buscar produtos"
          aria-autocomplete="list"
          aria-controls="search-suggestions-list"
          [attr.aria-activedescendant]="getActiveDescendantId()"
          autocomplete="off"
        />
        <button
          class="search-overlay__close-btn"
          type="button"
          (click)="close.emit()"
          aria-label="Fechar busca"
        >
          ✕
        </button>
      </div>

      @if (suggestions().length > 0) {
        <ul
          id="search-suggestions-list"
          class="search-overlay__suggestions"
          role="listbox"
          aria-label="Sugestões de produtos"
        >
          @for (suggestion of suggestions(); track suggestion.uuid; let i = $index) {
            <li
              [id]="'search-suggestion-' + i"
              class="search-overlay__suggestion-item"
              [class.search-overlay__suggestion-item--active]="i === activeIndex()"
              role="option"
              [attr.aria-selected]="i === activeIndex()"
              (click)="selectSuggestion(suggestion)"
            >
              @if (suggestion.imageUrl) {
                <img
                  class="search-overlay__suggestion-image"
                  [src]="suggestion.imageUrl"
                  [alt]="suggestion.name"
                  loading="lazy"
                />
              }
              <div class="search-overlay__suggestion-info">
                <span class="search-overlay__suggestion-name">{{ suggestion.name }}</span>
                <span class="search-overlay__suggestion-category">{{ suggestion.category }}</span>
              </div>
              <span class="search-overlay__suggestion-price">
                {{ suggestion.minPrice | currency:'BRL':'symbol':'1.2-2' }}
              </span>
            </li>
          }
        </ul>
      }
    </div>
  </div>
}
