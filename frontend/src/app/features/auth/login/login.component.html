<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Entrar</h1>
      <p>Bem-vindo de volta ao Reino &amp; Flor</p>
    </div>

    <div
      class="error-summary"
      role="alert"
      aria-live="assertive"
      *ngIf="errorMessage() as msg"
    >
      {{ msg }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-field">
        <label for="email">E-mail</label>
        <input
          #emailInput
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="seu@email.com"
          [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          aria-describedby="email-error"
        />
        <span
          id="email-error"
          class="field-error"
          *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
          aria-live="assertive"
        >
          <span *ngIf="form.get('email')?.hasError('required')">E-mail é obrigatório</span>
          <span *ngIf="form.get('email')?.hasError('email')">Formato de e-mail inválido</span>
        </span>
      </div>

      <div class="form-field">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
            placeholder="Mínimo 8 caracteres"
            [attr.aria-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            aria-describedby="password-error"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
          >
            {{ showPassword() ? '🙈' : '👁️' }}
          </button>
        </div>
        <span
          id="password-error"
          class="field-error"
          *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
          aria-live="assertive"
        >
          <span *ngIf="form.get('password')?.hasError('required')">Senha é obrigatória</span>
          <span *ngIf="form.get('password')?.hasError('minlength')">Senha deve ter no mínimo 8 caracteres</span>
        </span>
      </div>

      <div class="form-field checkbox-field">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe" />
          <span>Lembrar-me</span>
        </label>
        <a routerLink="/auth/recovery" class="forgot-link">Esqueceu a senha?</a>
      </div>

      <button
        type="submit"
        class="btn-primary"
        [disabled]="form.invalid || loading()"
      >
        <span *ngIf="!loading()">ENTRAR</span>
        <span *ngIf="loading()" class="spinner" aria-label="Carregando"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Ainda não tem conta? <a routerLink="/auth/register">Criar conta</a></p>
    </div>
  </div>
</div>
