<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Ativar Conta</h1>
      <p>Defina a senha do administrador inicial</p>
    </div>

    <div class="error-summary" role="alert" *ngIf="errorMessage() as msg">{{ msg }}</div>
    <div class="success-summary" role="status" *ngIf="successMessage() as msg">{{ msg }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-field">
        <label for="password">Senha</label>
        <input id="password" type="password" formControlName="password" autocomplete="new-password" />
        <span class="field-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Senha deve ter no mínimo 8 caracteres
        </span>
      </div>

      <div class="form-field">
        <label for="confirmPassword">Confirmar senha</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password" />
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Ativando...' : 'Ativar conta' }}
      </button>
    </form>

    <p class="auth-footer">
      <a routerLink="/auth/login">Voltar para login</a>
    </p>
  </div>
</div>
