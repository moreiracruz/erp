name: CI Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Stage 1: Compile + Security checks (fast fail)
  # ─────────────────────────────────────────────────────────────────────
  compile:
    name: Compile & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Compile all modules
        run: ./mvnw compile -B -q

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn --include="*.java" --include="*.yml" --include="*.xml" --include="*.properties" \
            -E "(password|secret|key|token)\s*=\s*['\"][^$\{]" \
            --exclude-dir=target --exclude-dir=.git \
            modules/ infrastructure/ bootstrap/src/main/ shared/ 2>/dev/null | \
            grep -v "test" | grep -v "example" | grep -v "placeholder"; then
            echo "⚠️ Potential hardcoded secrets found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Verify no .env files in repo
        run: |
          if find . -name ".env" -not -name ".env.example" -not -path "./.git/*" | grep -q .; then
            echo "❌ .env file found in repository!"
            exit 1
          fi
          echo "✅ No .env files in repo"

  # ─────────────────────────────────────────────────────────────────────
  # Stage 2: Unit + Property Tests (no Docker)
  # ─────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit & Property Tests
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run unit + property tests
        run: ./mvnw test -Pfast-tests -B

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Stage 3: Integration + E2E Tests (Docker + Testcontainers)
  # ─────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration & E2E Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_REUSE_ENABLE: 'false'
      CI: 'true'
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run integration + E2E tests
        run: ./mvnw verify -Pintegration -B

      - name: Upload failsafe reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: '**/target/failsafe-reports/'
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Stage 4: Architecture Validation
  # ─────────────────────────────────────────────────────────────────────
  architecture:
    name: Architecture Rules
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run ArchUnit tests
        run: ./mvnw test -pl infrastructure -Dtest="ModuleBoundaryTest" -B
