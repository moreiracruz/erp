name: CI Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Detect which parts changed
  # ─────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'modules/**'
              - 'shared/**'
              - 'infrastructure/**'
              - 'bootstrap/**'
              - 'pom.xml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  # ═══════════════════════════════════════════════════════════════════════
  # BACKEND PIPELINE
  # ═══════════════════════════════════════════════════════════════════════

  backend-compile:
    name: "Backend: Compile & Security Scan"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Compile all modules
        run: ./mvnw compile -B -q

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn --include="*.java" --include="*.yml" --include="*.xml" --include="*.properties" \
            -E "(password|secret|key|token)\s*=\s*['\"][^$\{]" \
            --exclude-dir=target --exclude-dir=.git --exclude-dir=frontend \
            modules/ infrastructure/ bootstrap/src/main/ shared/ 2>/dev/null | \
            grep -v "test" | grep -v "example" | grep -v "placeholder"; then
            echo "⚠️ Potential hardcoded secrets found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

  backend-unit-tests:
    name: "Backend: Unit & Property Tests"
    needs: backend-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run unit + property tests
        run: ./mvnw test -Pfast-tests -B

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  backend-integration-tests:
    name: "Backend: Integration & E2E Tests"
    needs: backend-unit-tests
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    env:
      TESTCONTAINERS_REUSE_ENABLE: 'false'
      CI: 'true'
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run integration + E2E tests
        run: ./mvnw verify -Pintegration -B

      - name: Upload failsafe reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-failsafe-reports
          path: '**/target/failsafe-reports/'
          retention-days: 7

  backend-architecture:
    name: "Backend: Architecture Rules"
    needs: backend-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Install modules locally & run ArchUnit
        run: ./mvnw install -DskipTests -B -q && ./mvnw test -pl infrastructure -Dtest="ModuleBoundaryTest" -B

  # ═══════════════════════════════════════════════════════════════════════
  # FRONTEND PIPELINE
  # ═══════════════════════════════════════════════════════════════════════

  frontend-build:
    name: "Frontend: Build & Lint"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npx ng build --configuration=production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  frontend-test:
    name: "Frontend: Unit Tests"
    needs: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7
