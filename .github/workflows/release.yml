name: Auto Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  DOCKER_IMAGE: moreiracruz/erp-loja-roupas

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Stage 1: Determine version bump from commits
  # ─────────────────────────────────────────────────────────────────────
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "📌 Latest tag: $LATEST"

      - name: Determine bump type
        id: bump
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          VERSION=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Get commits since last tag
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          fi
          
          if [ -z "$COMMITS" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "⏭️ No new commits since last tag"
            exit 0
          fi
          
          # Determine bump type
          BUMP_TYPE="${{ inputs.bump || 'auto' }}"
          
          if [ "$BUMP_TYPE" = "auto" ]; then
            if echo "$COMMITS" | grep -qE "^feat(\(.+\))?!:|BREAKING CHANGE"; then
              BUMP_TYPE="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP_TYPE="minor"
            elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\(.+\))?:"; then
              BUMP_TYPE="patch"
            else
              # Only docs, chore, ci, test, style — skip release
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "⏭️ No releasable commits (only docs/chore/ci/test)"
              exit 0
            fi
          fi
          
          # Calculate new version
          case $BUMP_TYPE in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "🚀 Bump: $BUMP_TYPE → v$NEW_VERSION"

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.should_release == 'true'
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            RANGE="${LATEST}..HEAD"
          else
            RANGE="HEAD"
          fi
          
          FEATS=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep "^- feat" || true)
          FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep "^- fix" || true)
          PERFS=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep "^- perf\|^- refactor" || true)
          OTHERS=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep -v "^- feat\|^- fix\|^- perf\|^- refactor" || true)
          
          {
            echo "changelog<<EOF"
            if [ -n "$FEATS" ]; then
              echo "### 🚀 Features"
              echo "$FEATS"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$PERFS" ]; then
              echo "### ⚡ Performance & Refactoring"
              echo "$PERFS"
              echo ""
            fi
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 Other"
              echo "$OTHERS"
              echo ""
            fi
            echo "### 🐳 Docker"
            echo '```bash'
            echo "docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.bump.outputs.new_version }}"
            echo "docker pull ghcr.io/${{ github.repository }}:${{ steps.bump.outputs.new_version }}"
            echo '```'
            echo "EOF"
          } >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────
  # Stage 2: Run full test suite
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Full Test Suite
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_REUSE_ENABLE: 'false'
      CI: 'true'
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run all tests
        run: ./mvnw verify -Pintegration -B

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Stage 3: Build & Push Docker Image
  # ─────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    needs: [version, test]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build JAR
        run: ./mvnw package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ needs.version.outputs.new_version }}
            ${{ env.DOCKER_IMAGE }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.new_version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.new_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ─────────────────────────────────────────────────────────────────────
  # Stage 4: Create Tag + GitHub Release
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [version, docker]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.new_tag }}" -m "Release ${{ needs.version.outputs.new_tag }}"
          git push origin "${{ needs.version.outputs.new_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: "${{ needs.version.outputs.new_tag }}"
          body: ${{ needs.version.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true
