name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  commit-lint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check conventional commits
        run: |
          echo "Validating commit messages follow conventional format..."
          PATTERN='^(feat|fix|refactor|test|docs|chore|perf|ci|style)(\([a-z0-9-]+\))?!?: .{1,72}$'
          ERRORS=0
          
          while IFS= read -r msg; do
            # Skip merge commits
            if [[ "$msg" =~ ^Merge ]]; then
              continue
            fi
            # Only validate first line (subject)
            SUBJECT=$(echo "$msg" | head -1)
            if [[ ! "$SUBJECT" =~ $PATTERN ]]; then
              echo "❌ Invalid: $SUBJECT"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(git log --format=%s origin/${{ github.base_ref }}..HEAD)
          
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "Expected format: <type>(<scope>): <subject>"
            echo "Types: feat, fix, refactor, test, docs, chore, perf, ci, style"
            echo "Example: feat(inventory): add batch stock entry endpoint"
            exit 1
          fi
          echo "✅ All commit messages are valid"

  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $4}')
          DELETIONS=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $6}')
          TOTAL=$((${ADDITIONS:-0} + ${DELETIONS:-0}))
          
          echo "PR size: +${ADDITIONS:-0} -${DELETIONS:-0} (total: $TOTAL lines)"
          
          if [ $TOTAL -gt 1000 ]; then
            echo "⚠️ Large PR detected ($TOTAL lines). Consider breaking into smaller PRs."
          fi

  migration-check:
    name: Migration Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check migration safety
        run: |
          MIGRATIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "db/migration" || true)
          
          if [ -z "$MIGRATIONS" ]; then
            echo "✅ No migrations in this PR"
            exit 0
          fi
          
          echo "📋 Migrations found:"
          echo "$MIGRATIONS"
          echo ""
          
          # Check for destructive operations
          for file in $MIGRATIONS; do
            if [ -f "$file" ]; then
              if grep -iE "DROP TABLE|DROP COLUMN|TRUNCATE|DELETE FROM" "$file"; then
                echo "⚠️ DESTRUCTIVE OPERATION detected in $file"
                echo "Ensure this is intentional and has a rollback plan."
              fi
            fi
          done
