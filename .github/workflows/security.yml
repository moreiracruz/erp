name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  push:
    branches: [main]
    paths:
      - '**/pom.xml'
  workflow_dispatch:

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check for dependency updates
        run: ./mvnw versions:display-dependency-updates -B 2>&1 | grep -E "\->" | head -30 || true

      - name: OWASP Dependency Check
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            -B || true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: '**/target/dependency-check-report.html'
          retention-days: 30

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in git history
        run: |
          echo "Checking for common secret patterns in tracked files..."
          FOUND=0
          
          # Check for private keys
          if git grep -l "BEGIN.*PRIVATE KEY" -- ':(exclude)*.md' 2>/dev/null; then
            echo "❌ Private key found!"
            FOUND=1
          fi
          
          # Check for AWS credentials
          if git grep -lE "AKIA[0-9A-Z]{16}" 2>/dev/null; then
            echo "❌ AWS access key found!"
            FOUND=1
          fi
          
          # Check for hardcoded passwords in Java
          if git grep -n --include="*.java" -E 'password\s*=\s*"[^"]{8,}"' -- ':(exclude)*Test*' ':(exclude)*test*' 2>/dev/null; then
            echo "❌ Hardcoded password in Java source!"
            FOUND=1
          fi
          
          if [ $FOUND -eq 0 ]; then
            echo "✅ No secrets detected"
          else
            exit 1
          fi
