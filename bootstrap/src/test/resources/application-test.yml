spring:
  autoconfigure:
    exclude:
      - io.opentelemetry.instrumentation.spring.autoconfigure.OpenTelemetryAutoConfiguration
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
  jpa:
    hibernate:
      ddl-auto: none
jwt:
  secret: "test-secret-key-that-is-at-least-256-bits-long-for-hs256-signing"
  expiration-seconds: 900
  refresh-expiration-days: 7
otel:
  sdk:
    disabled: true
